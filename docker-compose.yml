# Local dev stack for Artifact AI. Run with `docker compose up --build`.
#
# Kept intentionally minimal for now: just the API container. When you pick a
# database (Phase 1) and object storage (Phase 2), add them here as additional
# services. Secrets (GROQ_API_KEY) come from Backend/.env.

services:
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: artifact-ai-api:dev
    container_name: artifact-ai-api
    env_file:
      - ./Backend/.env
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped
